<!DOCTYPE html>
<html>
  <head>
  </head>
  <body>
    <h1>Hello, <span id="x"></span>!</h1>
    <input type="number" id="y" step="1" onchange="DB.count = parseInt(window.y.value)">
    <script src="browser.js"></script>
    <script>
      DB.count.$onnow = (k,d)=>window.x.innerText = d
      DB.count.$on = (k,d)=>console.log('key:',k)
      DB.count.$on = (k  ,d)=>console.log('data:',d)
      DB.count.$onnow = (k,d)=>window.x.style.color = d%2?'blue':'red'
    </script>
  </body>
</html>
